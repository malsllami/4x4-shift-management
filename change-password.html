<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تغيير كلمة المرور — 4x4 إدارة الورديات</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- بطاقة الترحيب بعد تغيير الباسورد -->
<div id="welcome-overlay" class="welcome-overlay hidden">
  <div class="welcome-card">
    <div class="welcome-avatar" id="welcome-avatar">م</div>
    <div class="welcome-greeting">تم تغيير كلمة المرور بنجاح ✅</div>
    <div class="welcome-name" id="welcome-name">أهلاً بك</div>
    <div class="welcome-meta">
      <span class="welcome-id-badge" id="welcome-id-badge">🪪 0000</span>
      <span class="shift-badge shift-a" id="welcome-shift">وردية أ</span>
    </div>
    <div class="welcome-role-badge" id="welcome-role">موظف</div>
    <div class="welcome-progress-wrap">
      <div class="welcome-progress-bar" id="welcome-progress"></div>
    </div>
    <div class="welcome-countdown">جاري التحويل خلال <span id="welcome-timer">3</span> ثوان...</div>
  </div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">🔒</div>
      <div class="auth-logo-title">تغيير كلمة المرور</div>
      <div class="auth-logo-sub">يجب تغيير الباسورد المؤقت قبل المتابعة</div>
    </div>

    <div class="alert alert-info" style="margin-bottom:20px;">
      <span>ℹ️</span>
      <span>يجب أن تكون كلمة المرور الجديدة 6 أحرف على الأقل</span>
    </div>

    <div id="cp-alert" class="alert alert-error alert-hidden">
      <span>⚠️</span>
      <span id="cp-alert-msg"></span>
    </div>

    <form id="cp-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="new-pw">كلمة المرور الجديدة</label>
        <div class="pw-wrap">
          <input id="new-pw" type="password" class="form-control"
            placeholder="6 أحرف على الأقل" required />
          <button type="button" class="pw-eye" id="toggle-new">👁</button>
        </div>
        <!-- مؤشر القوة -->
        <div class="pw-strength" id="pw-strength">
          <div class="pw-strength-bar" id="bar1"></div>
          <div class="pw-strength-bar" id="bar2"></div>
          <div class="pw-strength-bar" id="bar3"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-pw">تأكيد كلمة المرور</label>
        <div class="pw-wrap">
          <input id="confirm-pw" type="password" class="form-control"
            placeholder="أعد كتابة كلمة المرور" required />
          <button type="button" class="pw-eye" id="toggle-confirm">👁</button>
        </div>
      </div>

      <div style="display:flex; justify-content:center;">
        <button type="submit" class="btn btn-primary btn-block" id="cp-btn">
          <span class="spinner"></span>
          <span class="btn-check">✓</span>
          <span class="btn-text">تغيير وحفظ</span>
        </button>
      </div>

    </form>

    <div class="auth-footer">نظام إدارة الورديات — جميع الحقوق محفوظة</div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
/* التحقق من وجود جلسة */
const user = Auth.getSession();
if (!user) window.location.href = 'index.html';

/* ===== إظهار/إخفاء الباسورد ===== */
function makeToggle(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  let vis = false;
  btn.addEventListener('click', () => {
    vis = !vis;
    inp.type         = vis ? 'text' : 'password';
    btn.textContent  = vis ? '🙈' : '👁';
  });
}
makeToggle('new-pw', 'toggle-new');
makeToggle('confirm-pw', 'toggle-confirm');

/* ===== مؤشر قوة الباسورد ===== */
document.getElementById('new-pw').addEventListener('input', function () {
  const v = this.value;
  const bars = [document.getElementById('bar1'),
                document.getElementById('bar2'),
                document.getElementById('bar3')];
  bars.forEach(b => b.className = 'pw-strength-bar');

  if (v.length === 0) return;

  let score = 0;
  if (v.length >= 6)  score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v) || /[0-9]/.test(v) || /[^a-zA-Z0-9]/.test(v)) score++;

  const cls = ['weak','medium','strong'];
  for (let i = 0; i < score; i++) bars[i].classList.add(cls[score - 1]);
});

/* ===== أنيميشن الزر ===== */
const cpBtn = document.getElementById('cp-btn');

function morphBtn(state) {
  const btn = cpBtn;
  if (state === 'loading') {
    const w = btn.offsetWidth, h = btn.offsetHeight;
    btn.style.width = w + 'px'; btn.style.height = h + 'px';
    btn.offsetWidth;
    btn.style.width = h + 'px';
    btn.classList.add('btn-morphing');
    btn.classList.remove('btn-success-state');
  } else if (state === 'success') {
    btn.classList.remove('btn-morphing');
    btn.classList.add('btn-success-state');
  } else {
    btn.classList.remove('btn-morphing','btn-success-state');
    btn.style.width = btn.style.height = '';
  }
}

/* ===== بطاقة الترحيب ===== */
const SHIFT_CLASSES = { 'أ':'shift-a','ب':'shift-b','ج':'shift-c','د':'shift-d' };

function showWelcome(u) {
  const overlay  = document.getElementById('welcome-overlay');
  const avatar   = document.getElementById('welcome-avatar');
  const nameEl   = document.getElementById('welcome-name');
  const idBadge  = document.getElementById('welcome-id-badge');
  const shiftEl  = document.getElementById('welcome-shift');
  const roleEl   = document.getElementById('welcome-role');
  const progress = document.getElementById('welcome-progress');
  const timerEl  = document.getElementById('welcome-timer');

  avatar.textContent  = u.name ? u.name.trim().charAt(0) : 'م';
  nameEl.textContent  = u.name  || 'أهلاً';
  idBadge.textContent = '🪪 ' + (u.empId || '');
  shiftEl.textContent = 'وردية ' + (u.shift || '');
  shiftEl.className   = 'shift-badge ' + (SHIFT_CLASSES[u.shift] || 'shift-a');
  roleEl.textContent  = u.role  || 'موظف';

  overlay.classList.remove('hidden');

  const DURATION = 3000;
  let elapsed = 0;
  const tick = setInterval(() => {
    elapsed += 50;
    progress.style.width = Math.max(0, 100 - (elapsed / DURATION) * 100) + '%';
    timerEl.textContent  = Math.ceil((DURATION - elapsed) / 1000);
    if (elapsed >= DURATION) { clearInterval(tick); window.location.href = 'home.html'; }
  }, 50);
}

/* ===== تغيير الباسورد ===== */
const cpAlert    = document.getElementById('cp-alert');
const cpAlertMsg = document.getElementById('cp-alert-msg');

function showError(msg) {
  cpAlert.classList.remove('alert-hidden');
  cpAlertMsg.textContent = msg;
}
function hideError() { cpAlert.classList.add('alert-hidden'); }

document.getElementById('cp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();

  const newPw  = document.getElementById('new-pw').value;
  const confPw = document.getElementById('confirm-pw').value;

  if (newPw.length < 6) {
    showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
    return;
  }
  if (newPw !== confPw) {
    showError('كلمتا المرور غير متطابقتين');
    return;
  }

  morphBtn('loading');

  try {
    const result = await API.changePassword(user.empId, user.token, newPw);

    if (!result.success) {
      morphBtn('reset');
      showError(result.message || 'حدث خطأ، حاول مرة أخرى');
      return;
    }

    morphBtn('success');
    setTimeout(() => showWelcome(user), 700);

  } catch (err) {
    morphBtn('reset');
    showError('حدث خطأ في الاتصال، حاول مرة أخرى');
    console.error(err);
  }
});
</script>

<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-8px); }
  40%     { transform: translateX(8px); }
  60%     { transform: translateX(-5px); }
  80%     { transform: translateX(5px); }
}
</style>

</body>
</html>
