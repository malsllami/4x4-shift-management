<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — 4x4 إدارة الورديات</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">⚙️</div>
      <div class="auth-logo-title">4x4 إدارة الورديات</div>
      <div class="auth-logo-sub">سجّل دخولك للمتابعة</div>
    </div>

    <!-- Alert -->
    <div id="login-alert" class="alert alert-error alert-hidden" role="alert">
      <span>⚠️</span>
      <span id="login-alert-msg"></span>
    </div>

    <!-- Success Alert (after password reset) -->
    <div id="login-success" class="alert alert-success alert-hidden" role="alert">
      <span>✅</span>
      <span id="login-success-msg"></span>
    </div>

    <!-- Login Form -->
    <form id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="empId">الرقم الوظيفي</label>
        <input
          id="empId"
          type="text"
          class="form-control"
          placeholder="أدخل رقمك الوظيفي"
          autocomplete="username"
          inputmode="numeric"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">كلمة المرور</label>
        <div class="pw-wrap">
          <input
            id="password"
            type="password"
            class="form-control"
            placeholder="أدخل كلمة المرور"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pw-eye" id="pw-toggle" aria-label="إظهار / إخفاء كلمة المرور" title="إظهار / إخفاء">
            👁
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="login-btn">
        <span class="spinner"></span>
        <span class="btn-text">دخول</span>
      </button>

    </form>

    <div class="auth-link-row">
      <a href="forgot-password.html">نسيت كلمة المرور؟</a>
    </div>

    <div class="auth-footer">
      نظام إدارة الورديات — جميع الحقوق محفوظة
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  /* ---- عرض رسالة نجاح استعادة الباسورد إن وجدت ---- */
  const resetMsg = sessionStorage.getItem('reset_success');
  if (resetMsg) {
    document.getElementById('login-success').classList.remove('alert-hidden');
    document.getElementById('login-success-msg').textContent = resetMsg;
    sessionStorage.removeItem('reset_success');
  }

  /* ---- إظهار / إخفاء الباسورد ---- */
  const pwInput  = document.getElementById('password');
  const pwToggle = document.getElementById('pw-toggle');
  let pwVisible  = false;

  pwToggle.addEventListener('click', () => {
    pwVisible = !pwVisible;
    pwInput.type    = pwVisible ? 'text' : 'password';
    pwToggle.textContent = pwVisible ? '🙈' : '👁';
  });

  /* ---- نموذج الدخول ---- */
  const loginForm = document.getElementById('login-form');
  const loginBtn  = document.getElementById('login-btn');
  const alertBox  = document.getElementById('login-alert');
  const alertMsg  = document.getElementById('login-alert-msg');

  function showError(msg) {
    alertBox.classList.remove('alert-hidden');
    alertMsg.textContent = msg;
    document.getElementById('login-success').classList.add('alert-hidden');
  }

  function hideError() {
    alertBox.classList.add('alert-hidden');
  }

  function setLoading(on) {
    loginBtn.classList.toggle('loading', on);
    loginBtn.disabled = on;
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const empId    = document.getElementById('empId').value.trim();
    const password = document.getElementById('password').value;

    if (!empId || !password) {
      showError('الرجاء إدخال الرقم الوظيفي وكلمة المرور');
      return;
    }

    setLoading(true);

    try {
      const result = await API.login(empId, password);

      if (!result.success) {
        showError(result.message || 'الرقم الوظيفي أو كلمة المرور غير صحيحة');
        return;
      }

      /* حفظ بيانات الجلسة */
      Auth.setSession(result.user);

      if (result.force_change) {
        /* باسورد مؤقت → إجبار التغيير */
        window.location.href = 'change-password.html';
      } else {
        window.location.href = 'home.html';
      }

    } catch (err) {
      showError('حدث خطأ في الاتصال، حاول مرة أخرى');
      console.error(err);
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
