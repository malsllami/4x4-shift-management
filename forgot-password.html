<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نسيت كلمة المرور — 4x4 إدارة الورديات</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🔑</div>
      <div class="auth-logo-title">استعادة كلمة المرور</div>
      <div class="auth-logo-sub">أدخل بياناتك للتحقق من هويتك</div>
    </div>

    <!-- رسالة خطأ -->
    <div id="fp-alert" class="alert alert-error alert-hidden" role="alert">
      <span>⚠️</span>
      <span id="fp-alert-msg"></span>
    </div>

    <!-- النموذج -->
    <form id="fp-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="fp-empId">الرقم الوظيفي</label>
        <input id="fp-empId" type="text" class="form-control"
          placeholder="أدخل رقمك الوظيفي" inputmode="numeric" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="fp-name">الاسم</label>
        <input id="fp-name" type="text" class="form-control"
          placeholder="أدخل اسمك الكامل" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="fp-shift">الوردية</label>
        <select id="fp-shift" class="form-control form-select" required>
          <option value="">— اختر الوردية —</option>
          <option value="أ">وردية أ</option>
          <option value="ب">وردية ب</option>
          <option value="ج">وردية ج</option>
          <option value="د">وردية د</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="fp-phone">رقم الجوال</label>
        <input id="fp-phone" type="tel" class="form-control"
          placeholder="05xxxxxxxx" inputmode="numeric" required />
      </div>

      <div style="display:flex; justify-content:center;">
        <button type="submit" class="btn btn-primary btn-block" id="fp-btn">
          <span class="spinner"></span>
          <span class="btn-check">✓</span>
          <span class="btn-text">تحقق واسترداد</span>
        </button>
      </div>

    </form>

    <div class="auth-link-row">
      <a href="index.html">← العودة لتسجيل الدخول</a>
    </div>

    <div class="auth-footer">نظام إدارة الورديات — جميع الحقوق محفوظة</div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
const fpBtn   = document.getElementById('fp-btn');
const alertEl = document.getElementById('fp-alert');
const alertMsg = document.getElementById('fp-alert-msg');

function showError(msg) {
  alertEl.classList.remove('alert-hidden');
  alertMsg.textContent = msg;
  const card = document.querySelector('.auth-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'shake .35s ease both';
}

function hideError() { alertEl.classList.add('alert-hidden'); }

/* ===== أنيميشن الزر ===== */
function morphBtn(state) {
  const btn = fpBtn;
  if (state === 'loading') {
    const w = btn.offsetWidth, h = btn.offsetHeight;
    btn.style.width  = w + 'px';
    btn.style.height = h + 'px';
    btn.offsetWidth;
    btn.style.width = h + 'px';
    btn.classList.add('btn-morphing');
    btn.classList.remove('btn-success-state');
  } else if (state === 'success') {
    btn.classList.remove('btn-morphing');
    btn.classList.add('btn-success-state');
  } else {
    btn.classList.remove('btn-morphing', 'btn-success-state');
    btn.style.width = btn.style.height = '';
  }
}

document.getElementById('fp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();

  const empId = document.getElementById('fp-empId').value.trim();
  const name  = document.getElementById('fp-name').value.trim();
  const shift = document.getElementById('fp-shift').value;
  const phone = document.getElementById('fp-phone').value.trim();

  if (!empId || !name || !shift || !phone) {
    showError('الرجاء إدخال جميع الحقول');
    return;
  }

  morphBtn('loading');

  try {
    const result = await API.verifyEmployee(empId, name, shift, phone);

    if (!result.success) {
      morphBtn('reset');
      showError(result.message || 'البيانات المدخلة غير مطابقة، تأكد من صحتها');
      return;
    }

    morphBtn('success');

    setTimeout(() => {
      sessionStorage.setItem('reset_success',
        'تم إعادة تعيين كلمة مرورك. استخدم الرقم 123456 لتسجيل الدخول.');
      window.location.href = 'index.html';
    }, 1000);

  } catch (err) {
    morphBtn('reset');
    showError('حدث خطأ في الاتصال، حاول مرة أخرى');
    console.error(err);
  }
});
</script>

<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-8px); }
  40%     { transform: translateX(8px); }
  60%     { transform: translateX(-5px); }
  80%     { transform: translateX(5px); }
}
</style>

</body>
</html>
